<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GC – Ayad Salim</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="profile.css"/>
</head>
<body>

<div class="wrapper">
  <nav>
    <a class="logo" onclick="goHome()">GC</a>
    <div class="nav-games">
      <button class="nav-btn" onclick="goGame('cs2')" title="CS2">
        <img src="https://media.steampowered.com/apps/csgo/blog/images/fb_image.png?v=6" alt="CS2"/>
      </button>
      <button class="nav-btn" onclick="goGame('lol')" title="League of Legends">
        <img src="https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/565197caf987af4e4da307df6e2b235a28714736-837x469.jpg" alt="LoL"/>
      </button>
      <button class="nav-btn" onclick="goGame('valorant')" title="Valorant">
        <img src="https://i.pcmag.com/imagery/reviews/05mFypQIoSDkooz9qdATJ54-1..v1586539963.png" alt="Valorant"/>
      </button>
      <button class="nav-btn" onclick="goGame('arc')" title="ARC Raiders">
        <img src="https://www.exitlag.com/blog/wp-content/uploads/2025/01/MLBB_-everything-you-need-to-know-about-heroes-and-gameplay.webp" alt="ARC"/>
      </button>
      <button class="nav-btn" onclick="goGame('mobile')" title="Mobile Legends">
        <img src="https://static.wikia.nocookie.net/arc-raiders/images/a/a0/Logo.webp/revision/latest?cb=20251105003659" alt="Mobile"/>
      </button>
    </div>
    <div class="user-area">
      <div>
        <div class="user-name">Ayad Salim</div>
        <div class="user-tag">#Ayad99</div>
      </div>
      <div class="user-avatar">
        <img src="https://i.pcmag.com/imagery/reviews/05mFypQIoSDkooz9qdATJ54-1..v1586539963.png" alt="avatar"/>
      </div>
    </div>
  </nav>

  <div class="profile-wrapper">

    <div class="back-row">
      <button class="back-btn" onclick="history.back()">← Tillbaka</button>
    </div>

    <div class="profile-card">

      <!-- VÄNSTER: SPELRUTNÄT -->
      <div class="games-panel">

        <button class="game-tile" onclick="goGame('cs2')">
          <img src="https://media.steampowered.com/apps/csgo/blog/images/fb_image.png?v=6" alt="CS2"/>
        </button>

        <button class="game-tile" onclick="goGame('lol')">
          <img src="https://cmsassets.rgpub.io/sanity/images/dsfx7636/news/565197caf987af4e4da307df6e2b235a28714736-837x469.jpg" alt="League of Legends"/>
        </button>

        <button class="game-tile" onclick="goGame('valorant')">
          <img src="https://i.pcmag.com/imagery/reviews/05mFypQIoSDkooz9qdATJ54-1..v1586539963.png" alt="Valorant"/>
        </button>

        <button class="game-tile" onclick="goGame('mobile')">
          <img src="https://www.exitlag.com/blog/wp-content/uploads/2025/01/MLBB_-everything-you-need-to-know-about-heroes-and-gameplay.webp" alt="Mobile Legends"/>
        </button>

        <button class="game-tile" onclick="goGame('arc')">
          <img src="https://static.wikia.nocookie.net/arc-raiders/images/a/a0/Logo.webp/revision/latest?cb=20251105003659" alt="ARC Raiders"/>
        </button>

        <button class="game-tile">
          <img src="https://cdn.akamai.steamstatic.com/steam/apps/1172620/header.jpg" alt="Raft"/>
        </button>

      </div>

      <!-- HÖGER: PROFILINFO -->
      <div class="profile-panel">

        <div class="profile-avatar">
          <img src="https://i.pcmag.com/imagery/reviews/05mFypQIoSDkooz9qdATJ54-1..v1586539963.png" alt="Ayad Salim"/>
        </div>

        <div class="info-box">
          <div class="info-box-title">// Info om spelaren</div>

          <div class="info-row">
            <span class="lbl">Namn</span>
            <span class="val">Ayad Salim</span>
          </div>
          <div class="info-row">
            <span class="lbl">Tag</span>
            <span class="val">#Ayad99</span>
          </div>
          <div class="info-row">
            <span class="lbl">Rank</span>
            <span class="val">Global Elite</span>
          </div>
          <div class="info-row">
            <span class="lbl">Ålder</span>
            <span class="val">18–25</span>
          </div>
          <div class="info-row">
            <span class="lbl">Plattform</span>
            <span class="val">PC</span>
          </div>
          <div class="info-row">
            <span class="lbl">Speltid</span>
            <span class="val">Kväll</span>
          </div>
          <div class="info-row">
            <span class="lbl">Språk</span>
            <span class="val">SV / EN</span>
          </div>

          <p class="bio-text">Passionerad FPS-spelare. Söker seriöst lag för ranked!</p>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
