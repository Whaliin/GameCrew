{% extends "base.html" %}

{% block content %}
<h2>Register</h2>
{% if error %}
<script>
	alert("{{ error }}");
</script>
<p class="error">{{ error }}</p>
{% endif %}
<form method="post" action="/register">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" value="{{ form_data.username or '' }}" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>
    <small>Min 10 characters, must include uppercase, lowercase, digit, and special character.</small>

    <label for="birth_year">Birth Year</label>
    <input type="number" id="birth_year" name="birth_year" min="1900" max="{{ max_birth_year or 2099 }}" value="{{ form_data.birth_year or '' }}" required>

    <label for="region_id">Region</label>
    <select id="region_id" name="region_id" required>
        <option value="" {% if not form_data.region_id %}selected{% endif %} disabled>Select your region</option>
        {% for region in regions %}
        <option value="{{ region.id }}" {% if form_data.region_id == region.id %}selected{% endif %}>{{ region.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Register</button>
</form>
<p>Already have an account? <a href="/login">Log in</a></p>
{% endblock %}
