{% extends "base.html" %}

{% block title %}GC – Register{% endblock %}

{% block content %}
<div class="auth-shell">
	<div class="auth-card">
		<a class="auth-logo" href="/" aria-label="GameCrew home">GC</a>
		<h1 class="auth-title">Create account</h1>

		{% if error %}
		<p class="error">{{ error }}</p>
		{% endif %}

		<form method="post" action="/register" class="auth-form">
			<div class="field">
				<label for="username">Username</label>
				<input type="text" id="username" name="username" value="{{ form_data.username or '' }}" autocomplete="username" required>
			</div>

			<div class="field">
				<label for="password">Password</label>
				<input type="password" id="password" name="password" autocomplete="new-password" required>
				<small>Min 10 characters. Must include uppercase, lowercase, digit, and special character.</small>
			</div>

			<div class="field">
				<label for="birth_year">Birth year</label>
				<input type="number" id="birth_year" name="birth_year" min="1900" max="{{ max_birth_year or 2099 }}" value="{{ form_data.birth_year or '' }}" required>
			</div>

			<div class="field">
				<label for="region_id">Region</label>
				<select id="region_id" name="region_id" required>
					<option value="" {% if not form_data.region_id %}selected{% endif %} disabled>Select your region</option>
					{% for region in regions %}
					<option value="{{ region.id }}" {% if form_data.region_id == region.id %}selected{% endif %}>{{ region.name }}</option>
					{% endfor %}
				</select>
			</div>

			<div class="auth-actions">
				<button type="submit" class="btn-primary">Register</button>
			</div>
		</form>

		<p class="auth-footer">
			Already have an account? <a href="/login">Log in</a>
		</p>
	</div>
</div>
{% endblock %}
